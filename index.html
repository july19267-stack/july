<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>July's Space</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: linear-gradient(270deg, #dbeafe, #fbcfe8, #c7d2fe);
            background-size: 600% 600%;
            animation: gradientMove 10s ease infinite;
        }
        
        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        .card {
            background: rgba(255,255,255,0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 999px;
            background: #6366f1;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<script>
const text = "Hi, I'm July 🌙";
let i = 0;

function typingEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typingEffect, 80);
  }
}

typingEffect();
</script>
    
<body>
<div class="card">
    <h1 id="typing"></h1>
    <p>这里是我的小角落</p>

    <a href="diary.html" class="btn">点我看看</a>
</div>
</body>
</html>
